version: '3.8'

services:
  crypto-api:
    build: .
    container_name: crypto_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql+asyncpg://bot_user:secure_password@postgres:5432/crypto_db

  postgres:
    image: postgres:16-alpine
    container_name: crypto_db
    restart: always
    environment:
      POSTGRES_DB: crypto_db
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: